{% extends "master.html" %}
{% block title %}{{ 'Edit' if product else 'Add' }} Product - Smart Inventory{% endblock %}

{% block content %}
<h2 class="mb-4">
    <i class="bi bi-box"></i>
    {{ 'Edit Product' if product else 'Add New Product' }}
</h2>

<div class="card shadow">
    <div class="card-body">
        <form action="{{ '/products/edit/' ~ product.id if product else '/products/create' }}" method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="name" class="form-control"
                           value="{{ product.name if product else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">SKU</label>
                    <input type="text" name="sku" class="form-control"
                           value="{{ product.sku if product else '' }}" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Price</label>
                    <input type="number" name="price" class="form-control" step="0.01"
                           value="{{ product.price if product else '0' }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" name="quantity" class="form-control"
                           value="{{ product.quantity if product else '0' }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Min Stock (Alert Threshold)</label>
                    <input type="number" name="min_stock" class="form-control"
                           value="{{ product.min_stock if product else '10' }}" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Category</label>
                    <select name="category_id" class="form-select" required>
                        <option value="">-- Select Category --</option>
                        {% for c in categories %}
                        <option value="{{ c.id }}"
                                {{ 'selected' if product and product.category_id == c.id else '' }}>
                            {{ c.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Image</label>
                    <input type="file" name="image" class="form-control" accept="image/*">
                    {% if product and product.image %}
                    <div class="mt-2">
                        <img src="/static/uploads/{{ product.image }}" width="80" class="rounded">
                    </div>
                    {% endif %}
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> {{ 'Update' if product else 'Create' }}
                </button>
                <a href="/products" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
