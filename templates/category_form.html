{% extends "master.html" %}
{% block title %}{{ 'Edit' if category else 'Add' }} Category - Smart Inventory{% endblock %}

{% block content %}
<h2 class="mb-4">
    <i class="bi bi-tags"></i>
    {{ 'Edit Category' if category else 'Add New Category' }}
</h2>

<div class="card shadow">
    <div class="card-body">
        <form action="{{ '/categories/edit/' ~ category.id if category else '/categories/create' }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Category Name</label>
                <input type="text" name="name" class="form-control"
                       value="{{ category.name if category else '' }}" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> {{ 'Update' if category else 'Create' }}
                </button>
                <a href="/categories" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
